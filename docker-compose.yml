# agent-fleet-skeleton — Docker Compose
#
# Boot:
#   docker compose up -d --build
# Watch:
#   docker compose logs -f manager
#   docker compose logs -f worker
# Stop:
#   docker compose stop
# Teardown:
#   docker compose down
#
# AUTH NOTE: configured for Claude Max via OAuth on the mounted ~/.claude session.
# Do NOT set ANTHROPIC_API_KEY in .env — that routes through API-key billing
# and bypasses the Max subscription.
#
# WINDOWS NOTE: set HOST_HOME=C:/Users/YourName in .env. Do not use HOME —
# it leaks into containers and overrides their internal home directory.

services:
  redis:
    build:
      context: .
      dockerfile: docker/redis/Dockerfile
    image: fleet-redis:latest
    container_name: fleet-redis
    restart: unless-stopped
    environment:
      REDIS_MANAGER_PASS: "${REDIS_MANAGER_PASS:-fleet-mgr-secret}"
      REDIS_WORKER_PASS:  "${REDIS_WORKER_PASS:-fleet-wkr-secret}"
      REDIS_MAXMEMORY:    "${REDIS_MAXMEMORY:-1gb}"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  manager:
    build:
      context: .
      dockerfile: docker/manager/Dockerfile
      args:
        USER_UID: "${UID:-1000}"
        USER_GID: "${GID:-1000}"
    image: fleet-manager:latest
    container_name: fleet-manager
    restart: unless-stopped
    working_dir: /workspace
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      TICK_INTERVAL_MINUTES:      "${TICK_INTERVAL_MINUTES:-15}"
      FLEET_SIZE:                 "${FLEET_SIZE:-2}"
      MAX_FLEET_SIZE:             "${MAX_FLEET_SIZE:-4}"
      MIN_TICK_INTERVAL_MINUTES:  "${MIN_TICK_INTERVAL_MINUTES:-5}"
      WORKER_TIMEOUT_MINUTES:     "${CLAUDE_MAX_MINUTES:-20}"
      AGENT_PROVIDER:             "${AGENT_PROVIDER:-claude}"
      AGENT_FALLBACK:             "${AGENT_FALLBACK:-}"
      CANARY_MODEL:               "${CANARY_MODEL:-claude-haiku-4-5-20251001}"
      FALLBACK_CANARY_MODEL:      "${FALLBACK_MODEL:-qwen2.5-coder:14b}"
      OLLAMA_API_BASE:            "${OLLAMA_API_BASE:-http://host.docker.internal:11434}"
      ACTIVE_PACK:                "${ACTIVE_PACK:-example-research}"
      REDIS_URL:                  "redis://manager:${REDIS_MANAGER_PASS:-fleet-mgr-secret}@redis:6379"
      JOB_QUEUE:                  "fleet:jobs"
      RESULT_QUEUE:               "fleet:results"
      AGENT_AUTO_PUSH:            "${AGENT_AUTO_PUSH:-false}"
      BRANCH:                     "${BRANCH:-main}"
      GIT_SSH_COMMAND: 'ssh -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/home/fleet/.ssh-writable/known_hosts'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - type: bind
        source: .
        target: /workspace
      - type: bind
        source: ${HOST_HOME:-${HOME}}/.claude
        target: /home/fleet/.claude
      - type: bind
        source: ${HOST_HOME:-${HOME}}/.claude.json
        target: /home/fleet/.claude.json.host
        read_only: true
      - type: bind
        source: ${HOST_HOME:-${HOME}}/.ssh
        target: /home/fleet/.ssh
        read_only: true

  monitor:
    build:
      context: .
      dockerfile: docker/monitor/Dockerfile
    image: fleet-monitor:latest
    container_name: fleet-monitor
    restart: unless-stopped
    ports:
      - "${MONITOR_PORT:-8080}:8080"
    environment:
      MONITOR_PORT: "8080"
      ACTIVE_PACK:  "${ACTIVE_PACK:-example-research}"
    volumes:
      - type: bind
        source: .
        target: /workspace
        read_only: true

  worker:
    build:
      context: .
      dockerfile: docker/worker/Dockerfile
      args:
        USER_UID: "${UID:-1000}"
        USER_GID: "${GID:-1000}"
    image: fleet-worker:latest
    restart: unless-stopped
    working_dir: /workspace
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      REDIS_URL:          "redis://worker:${REDIS_WORKER_PASS:-fleet-wkr-secret}@redis:6379"
      JOB_QUEUE:          "fleet:jobs"
      RESULT_QUEUE:       "fleet:results"
      CLAUDE_MAX_MINUTES: "${CLAUDE_MAX_MINUTES:-20}"
      AGENT_PROVIDER:     "${AGENT_PROVIDER:-claude}"
      AGENT_MODEL:        "${AGENT_MODEL:-claude-sonnet-4-7}"
      AGENT_FALLBACK:     "${AGENT_FALLBACK:-}"
      FALLBACK_MODEL:     "${FALLBACK_MODEL:-qwen2.5-coder:14b}"
      OLLAMA_API_BASE:    "${OLLAMA_API_BASE:-http://host.docker.internal:11434}"
      ACTIVE_PACK:        "${ACTIVE_PACK:-example-research}"
      SEARXNG_URL:        "${SEARXNG_URL:-http://searxng:8080}"
      CACHE_TTL:          "${CACHE_TTL:-86400}"
      OLLAMA_NUM_CTX:     "${OLLAMA_NUM_CTX:-16384}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - type: bind
        source: .
        target: /workspace
      # orchestrator/ is read-only for workers — the manager owns those files.
      - type: bind
        source: ./orchestrator
        target: /workspace/orchestrator
        read_only: true
      - type: bind
        source: ${HOST_HOME:-${HOME}}/.claude
        target: /home/fleet/.claude
      - type: bind
        source: ${HOST_HOME:-${HOME}}/.claude.json
        target: /home/fleet/.claude.json.host
        read_only: true
    deploy:
      replicas: ${FLEET_SIZE:-2}

  # Optional web-grounding search engine. Only starts with:
  #   docker compose --profile grounding up -d --build
  searxng:
    image: searxng/searxng:latest
    container_name: fleet-searxng
    restart: unless-stopped
    profiles: ["grounding"]
    volumes:
      - ./docker/searxng/settings.yml:/etc/searxng/settings.yml:ro
    environment:
      SEARXNG_BASE_URL: "http://searxng:8080/"
